name: Build Android APK

on:
  workflow_dispatch: {}

env:
  QT_VERSION: '6.5.3'
  NDK_VERSION: '27.2.12479018'
  ANDROID_PLATFORM: 'android-33'
  ANDROID_ABI: 'arm64-v8a'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK & NDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platforms;android-33" "build-tools;33.0.2" "ndk;27.2.12479018"

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Install Qt (Android arm64-v8a)
        id: qt-android
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: android
          arch: android_arm64_v8a
          modules: qtmultimedia

      - name: Install Qt (host gcc_64)
        id: qt-host
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: gcc_64

      - name: Install vcpkg deps (arm64-android)
        run: |
          vcpkg install \
            --triplet arm64-android \
            --x-install-root=${{ github.workspace }}/build-vcpkg-android/vcpkg_installed \
            libqrencode nu-book-zxing-cpp
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}

      - name: Configure CMake
        run: |
          cmake -S . -B build-android-qr-arm64 -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.qt-android.outputs.qt-install-path }}/lib/cmake/Qt6/qt.toolchain.cmake \
            -DCMAKE_PREFIX_PATH=${{ steps.qt-android.outputs.qt-install-path }} \
            -DQT_HOST_PATH=${{ steps.qt-host.outputs.qt-install-path }} \
            -DANDROID_ABI=${{ env.ANDROID_ABI }} \
            -DANDROID_PLATFORM=${{ env.ANDROID_PLATFORM }} \
            -DAIRGAP_QR_DEP_ROOT=${{ github.workspace }}/build-vcpkg-android/vcpkg_installed/arm64-android \
            -DBUILD_TESTING=OFF

      - name: Build APK
        run: cmake --build build-android-qr-arm64 --parallel

      - name: Locate APK
        run: |
          find build-android-qr-arm64 -name "*.apk" -print
          echo "APK_PATH=$(find build-android-qr-arm64 -name 'android-build-debug.apk' | head -1)" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: airgap-android-arm64-debug-apk
          path: ${{ env.APK_PATH }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag: v0.2.8
          files: ${{ env.APK_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
